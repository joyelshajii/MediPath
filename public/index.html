<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediPath</title>
  <meta name="description"
    content="MediPath: GPS-free hospital navigation, real-time doctor tracking, and transparent patient feedback for St. Joseph's Mission Hospital." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="favicon.png" />
</head>

<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-bg">
      <div class="login-orb orb-1"></div>
      <div class="login-orb orb-2"></div>
      <div class="login-orb orb-3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <img src="logo.png" alt="MediPath Logo" width="56" height="56">
        </div>
        <div>
          <h1 class="login-title">MediPath</h1>
          <p class="login-subtitle">Hospital Navigation & Management</p>
        </div>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="login-password" placeholder="Enter your password" required
              autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggle-pw-btn"
              aria-label="Toggle password visibility">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="error-banner hidden"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span>Sign In</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>
      </form>
      <div style="margin-top: 24px; text-align: center;">
        <button type="button" class="btn btn-outline btn-full" onclick="hideLogin()">
          <span>Cancel</span>
        </button>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="logo.png" alt="MediPath" width="36" height="36">
          <span class="sidebar-app-name">MediPath</span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
      </div>

      <!-- User Info -->
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar-sidebar"></div>
        <div class="user-info">
          <div class="user-name" id="user-name-sidebar"></div>
          <div class="user-role-badge" id="user-role-sidebar"></div>
        </div>
      </div>

      <!-- Nav Menu -->
      <nav class="sidebar-nav" id="sidebar-nav"></nav>

      <!-- Dept Info & Logout -->
      <div class="sidebar-footer">
        <div class="dept-info" id="sidebar-dept"></div>
        <button class="btn-logout" onclick="doLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
          </svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Main content -->
    <div class="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <button class="topbar-menu-btn" id="topbar-menu-btn" onclick="openSidebar()" aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18" />
          </svg>
        </button>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-right">
          <div class="topbar-time" id="topbar-time"></div>
          <div class="topbar-user" id="topbar-user"></div>
        </div>
      </header>

      <!-- Page content -->
      <main class="page-content" id="page-content">
        <div class="page-loader">
          <div class="spinner"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/navigation.js"></script>
  <script src="/js/doctors.js"></script>
  <script src="/js/feedback.js"></script>
  <script src="/js/schedules.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>
